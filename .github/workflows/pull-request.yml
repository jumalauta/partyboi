name: Pull request checks

permissions:
  contents: read

on:
  pull_request:

jobs:
  tests:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run tests
        uses: ./.github/actions/run-tests
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build an image
        uses: ./.github/actions/build-image
  smoke:
    needs: build
    name: "Smoke test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Smoke-test the image
        uses: ./.github/actions/smoke-test
  sync-test:
    needs: build
    name: "Sync harness"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run the two-instance sync harness
        uses: ./.github/actions/sync-test
