name: Pull request checks

permissions:
  contents: read

on:
  pull_request:

jobs:
  tests:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        uses: ./.github/actions/run-tests
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build an image
        uses: ./.github/actions/build-image
  smoke:
    needs: build
    name: "Smoke test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Smoke-test the image
        uses: ./.github/actions/smoke-test
