services:

  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: "password"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "partyboi_master"
    volumes:
      - "./db-dev/init-sync-test.sh:/docker-entrypoint-initdb.d/init-sync-test.sh"
    ports:
      - "15432:5432"
    networks:
      - sync-test
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d partyboi_remote -c 'SELECT 1' >/dev/null" ]
      interval: 1s
      timeout: 5s
      retries: 30

  appserver-master:
    build: .
    environment:
      INSTANCE_ID: "master"
      INSTANCE_NAME: "Master"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "password"
      DB_USER: "postgres"
      DB_PASSWORD: "password"
      DB_DATABASE: "partyboi_master"
      DB_HOST: "db"
      DB_PORT: "5432"
      FILES: "/files"
    ports:
      - "18123:8123"
    volumes:
      - "./build/sync-test/files-master:/files"
    networks:
      - sync-test
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "exec 3<>/dev/tcp/localhost/8123 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'" ]
      interval: 2s
      timeout: 5s
      retries: 30

  appserver-remote:
    build: .
    environment:
      INSTANCE_ID: "remote"
      INSTANCE_NAME: "Remote"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "password"
      DB_USER: "postgres"
      DB_PASSWORD: "password"
      DB_DATABASE: "partyboi_remote"
      DB_HOST: "db"
      DB_PORT: "5432"
      FILES: "/files"
    ports:
      - "18124:8123"
    volumes:
      - "./build/sync-test/files-remote:/files"
    networks:
      - sync-test
    depends_on:
      db:
        condition: service_healthy
      appserver-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "exec 3<>/dev/tcp/localhost/8123 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'" ]
      interval: 2s
      timeout: 5s
      retries: 30

networks:
  sync-test:
    name: partyboi-sync-test
